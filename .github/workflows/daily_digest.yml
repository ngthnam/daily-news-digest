name: Daily News Digest

on:
  schedule:
    # Run at 23:00 UTC = 06:00 ICT (UTC+7)
    - cron: "0 23 * * *"
  workflow_dispatch:
    inputs:
      categories:
        description: "Comma-separated categories to run (leave empty for all)"
        required: false
        default: ""

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CATEGORIES: ${{ github.event.inputs.categories || 'tech,finance,realestate,construction,health' }}
          SUMMARY_LANGUAGE: vi
          LOOKBACK_HOURS: "25"
          MAX_PER_FEED: "10"
          MAX_WORKERS: "8"
        run: |
          cd scripts
          python pipeline.py

      - name: Commit data files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add data/ site/
          git diff --staged --quiet || git commit -m "digest: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          force_orphan: false
          commit_message: "deploy: ${{ github.run_id }}"
